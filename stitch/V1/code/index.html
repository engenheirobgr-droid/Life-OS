<!DOCTYPE html>
<html lang="pt-BR" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Vida</title>

    <!-- Tailwind CSS & Setup -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#01696f",
                        "primary-container": "#004f54",
                        "on-primary": "#ffffff",
                        "secondary": "#476365",
                        "secondary-container": "#c7e5e8",
                        "on-secondary-container": "#4c676a",
                        "surface": "#faf9f5",
                        "surface-dim": "#dbdad6",
                        "surface-variant": "#e3e2df",
                        "on-surface-variant": "#3f4949",
                        "surface-container": "#efeeea",
                        "surface-container-low": "#f5f4f0",
                        "surface-container-lowest": "#ffffff",
                        "background": "#faf9f5",
                        "on-background": "#1b1c1a",
                        "outline": "#6f797a",
                        "outline-variant": "#bec8c9",
                        "error": "#ba1a1a",
                    },
                    fontFamily: {
                        "headline": ["Newsreader", "serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,600;1,6..72,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <!-- Base Styles -->
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .font-serif-italic { font-family: 'Newsreader', serif; font-style: italic; }
        body { -webkit-font-smoothing: antialiased; font-size: 16px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .toast-animate-in { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* Trail line standardized CSS */
        .trail-line::before {
            content: '';
            position: absolute;
            left: 11px;
            top: 24px;
            bottom: 24px;
            width: 1px;
            background-color: #01696f;
            opacity: 0.1;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen">

    <!-- TopAppBar -->
    <header class="bg-[#faf9f5] dark:bg-stone-950 flex justify-between items-center w-full px-6 py-4 sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <button class="transition-colors duration-200 hover:bg-stone-200/50 dark:hover:bg-stone-800/50 p-2 rounded-full">
                <span class="material-symbols-outlined text-[#01696f]">menu</span>
            </button>
            <h1 class="text-2xl font-serif italic text-[#01696f] dark:text-[#01696f]">Sistema Vida</h1>
        </div>
        <div class="flex items-center gap-4">
            <button class="transition-colors duration-200 hover:bg-stone-200/50 dark:hover:bg-stone-800/50 p-2 rounded-full relative">
                <span class="material-symbols-outlined text-[#01696f]">notifications</span>
                <span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full border-2 border-[#faf9f5]"></span>
            </button>
        </div>
    </header>

    <!-- Main Dynamic Content Container -->
    <main id="app-content" class="pb-28 pt-2">
        <!-- Views will be injected here by app.js -->
    </main>

    <!-- App Scripts (State, Router, Logic) -->
    <script type="module" src="app.js"></script>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-stone-900/80 backdrop-blur-xl shadow-[0_-4px_20px_rgba(0,0,0,0.03)] border-t border-stone-200/20 dark:border-stone-800/20">
        <a href="#" onclick="app.navigate('hoje')" class="nav-item-link flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 scale-95 active:scale-90 transition-transform hover:opacity-80" data-view="hoje">
            <span class="material-symbols-outlined">calendar_today</span>
            <span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Hoje</span>
        </a>
        <a href="#" onclick="app.navigate('planos')" class="nav-item-link flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 scale-95 active:scale-90 transition-transform hover:opacity-80" data-view="planos">
            <span class="material-symbols-outlined">layers</span>
            <span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Planos</span>
        </a>
        <a href="#" onclick="app.navigate('proposito')" class="nav-item-link flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 scale-95 active:scale-90 transition-transform hover:opacity-80" data-view="proposito">
            <span class="material-symbols-outlined">explore</span>
            <span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Propósito</span>
        </a>
        <a href="#" onclick="app.navigate('painel')" class="nav-item-link flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 scale-95 active:scale-90 transition-transform hover:opacity-80" data-view="painel">
            <span class="material-symbols-outlined">analytics</span>
            <span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Painel</span>
        </a>
        <a href="#" onclick="app.navigate('perfil')" class="nav-item-link flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 scale-95 active:scale-90 transition-transform hover:opacity-80" data-view="perfil">
            <span class="material-symbols-outlined">person</span>
            <span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Perfil</span>
        </a>
    </nav>
    
</body>
</html>
