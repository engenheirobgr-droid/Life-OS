<!DOCTYPE html>
<html><head><title>Debug - Life OS</title></head>
<body style="font-family:monospace;padding:20px;background:#111;color:#eee">
<h2>🔍 Diagnóstico de Micros</h2>
<div id="output"></div>
<script>
const raw = localStorage.getItem('lifeos_state_backup');
if (!raw) {
    document.getElementById('output').innerHTML = '<p style="color:red">❌ Nenhum dado no localStorage!</p>';
} else {
    const state = JSON.parse(raw);
    const micros = state?.entities?.micros || [];
    let html = '<p style="color:lime">✅ Estado encontrado no localStorage</p>';
    html += '<p>Total de micros: <b>' + micros.length + '</b></p>';
    html += '<hr>';
    if (micros.length === 0) {
        html += '<p style="color:orange">⚠️ Array de micros está VAZIO</p>';
    } else {
        micros.forEach((m, i) => {
            const hasId = !!m.id;
            const hasTitle = !!m.title;
            const color = (hasId && hasTitle) ? 'lime' : 'red';
            html += '<div style="border:1px solid #444;padding:8px;margin:4px;color:'+color+'">';
            html += '<b>#' + i + '</b> id="' + m.id + '" title="' + m.title + '" status="' + m.status + '" completed=' + m.completed + ' progress=' + m.progress;
            if (!hasId) html += ' <span style="color:red">❌ SEM ID!</span>';
            if (!hasTitle) html += ' <span style="color:red">❌ SEM TITLE!</span>';
            html += '</div>';
        });
    }
    html += '<hr><h3>Timestamp</h3>';
    html += '<p>_lastUpdatedAt: ' + new Date(state._lastUpdatedAt).toLocaleString() + '</p>';
    document.getElementById('output').innerHTML = html;
}
</script>
</body></html>
