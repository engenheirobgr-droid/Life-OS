name: Habit Reminders Cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel reminder endpoint
        env:
          CRON_URL: https://life-os-mu-ashy.vercel.app/api/cron-habit-reminders
          CRON_SECRET: ${{ secrets.LIFEOS_CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing required secret: LIFEOS_CRON_SECRET"
            exit 1
          fi

          echo "Pinging $CRON_URL"
          curl --fail-with-body -sS -X GET "$CRON_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "User-Agent: lifeos-github-cron/1.0"
