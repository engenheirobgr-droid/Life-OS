name: Habit Reminders Cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel reminder endpoint
        env:
          CRON_URL: ${{ secrets.LIFEOS_CRON_URL }}
          CRON_SECRET: ${{ secrets.LIFEOS_CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing required secrets: LIFEOS_CRON_URL and/or LIFEOS_CRON_SECRET"
            exit 1
          fi

          echo "Pinging $CRON_URL"
          curl -sS -X GET "$CRON_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "User-Agent: lifeos-github-cron/1.0"
