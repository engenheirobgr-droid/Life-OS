<!DOCTYPE html>
<html lang="pt-br" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS | Sistema Vida</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    
    <!-- Tailwind for rapid premium layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#01696f',
                        'on-primary': '#ffffff',
                        'primary-container': '#9cf1f6',
                        'on-primary-container': '#002022',
                        secondary: '#4a6365',
                        'on-secondary': '#ffffff',
                        'secondary-container': '#cce8ea',
                        'on-secondary-container': '#051f21',
                        tertiary: '#4e5f7d',
                        'on-tertiary': '#ffffff',
                        'tertiary-container': '#d6e3ff',
                        'on-tertiary-container': '#081c36',
                        error: '#ba1a1a',
                        'on-error': '#ffffff',
                        'error-container': '#ffdad6',
                        'on-error-container': '#410002',
                        background: '#f8fafc',
                        'on-background': '#191c1d',
                        surface: '#f8fafc',
                        'on-surface': '#191c1d',
                        'surface-variant': '#dae4e5',
                        'on-surface-variant': '#3f484a',
                        outline: '#6f797a',
                        'outline-variant': '#bec8ca',
                        'surface-container-lowest': '#ffffff',
                        'surface-container-low': '#f0f4f5',
                        'surface-container': '#e9eff0',
                        'surface-container-high': '#e3e9eb',
                        'surface-container-highest': '#dee4e5',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        headline: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        @layer base {
            body { @apply font-sans bg-background text-on-background antialiased selection:bg-primary/20; }
            h1, h2, h3, h4 { @apply font-headline; }
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Material Symbols Fill Animation */
        .nav-item-link[data-active="true"] .material-symbols-outlined {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Smooth View Transitions */
        #app-content { transition: opacity 0.2s ease-in-out; }
        #app-content.loading { opacity: 0; }
        
        /* Toast Animation */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-animate-in { animation: slideUp 0.4s cubic-bezier(0.19, 1, 0.22, 1); }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Mobile Header -->
    <header class="lg:hidden px-6 py-4 flex items-center justify-between sticky top-0 bg-background/80 backdrop-blur-md z-40 border-b border-outline-variant/30">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center">
                <span class="material-symbols-outlined text-white text-xl">temp_preferences_custom</span>
            </div>
            <span class="font-headline font-bold text-lg tracking-tight text-on-background">Life OS</span>
        </div>
        <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-surface-container" onclick="app.navigate('perfil')">
            <span class="material-symbols-outlined text-outline">account_circle</span>
        </button>
    </header>

    <div class="flex flex-1 overflow-hidden lg:overflow-visible">
        <!-- Desktop Sidebar -->
        <aside class="hidden lg:flex w-72 flex-col border-r border-outline-variant/30 bg-surface px-4 py-8 sticky top-0 h-screen">
            <div class="px-4 mb-10 flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined text-white text-2xl">temp_preferences_custom</span>
                </div>
                <div>
                    <h1 class="font-headline font-bold text-xl tracking-tight leading-none text-on-background">Life OS</h1>
                    <p class="text-[10px] text-outline uppercase tracking-widest mt-1 font-bold">Arquitetura Vital</p>
                </div>
            </div>

            <nav class="flex-1 space-y-2">
                <button data-view="hoje" class="nav-item-link w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all hover:bg-surface-container text-on-surface-variant font-medium" onclick="app.navigate('hoje')">
                    <span class="material-symbols-outlined">today</span>
                    Hoje
                </button>
                <button data-view="painel" class="nav-item-link w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all hover:bg-surface-container text-on-surface-variant font-medium" onclick="app.navigate('painel')">
                    <span class="material-symbols-outlined">dashboard</span>
                    Painel
                </button>
                <button data-view="planos" class="nav-item-link w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all hover:bg-surface-container text-on-surface-variant font-medium" onclick="app.navigate('planos')">
                    <span class="material-symbols-outlined">assignment</span>
                    Planos
                </button>
                <button data-view="proposito" class="nav-item-link w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all hover:bg-surface-container text-on-surface-variant font-medium" onclick="app.navigate('proposito')">
                    <span class="material-symbols-outlined">auto_awesome</span>
                    Propósito
                </button>
            </nav>

            <div class="mt-auto pt-6 border-t border-outline-variant/20">
                <button data-view="perfil" class="nav-item-link w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all hover:bg-surface-container text-on-surface-variant font-medium" onclick="app.navigate('perfil')">
                    <span class="material-symbols-outlined">account_circle</span>
                    <div class="flex flex-col text-left">
                        <span class="text-sm font-bold text-on-background" id="perfil-sidebar-name">Viajante</span>
                        <span class="text-[10px] text-outline uppercase tracking-wider">Ver Perfil</span>
                    </div>
                </button>
            </div>
        </aside>

        <!-- Main Content area -->
        <main class="flex-1 overflow-y-auto min-h-screen pb-32 lg:pb-12 bg-background relative">
            <div id="app-content" class="fade-in">
                <!-- Views loaded here -->
                <div class="flex flex-col items-center justify-center min-h-[60vh] text-outline animate-pulse">
                    <span class="material-symbols-outlined text-4xl mb-4">refresh</span>
                    <p class="font-medium">Carregando sua jornada...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="lg:hidden fixed bottom-0 left-0 right-0 h-20 bg-surface/90 backdrop-blur-xl border-t border-outline-variant/30 px-6 flex items-center justify-between z-50">
        <button data-view="hoje" class="nav-item-link flex flex-col items-center gap-1 transition-all" onclick="app.navigate('hoje')">
            <div class="w-12 h-8 rounded-full flex items-center justify-center transition-colors hover:bg-primary-container/30">
                <span class="material-symbols-outlined text-outline">today</span>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-wider text-outline">Hoje</span>
        </button>
        <button data-view="painel" class="nav-item-link flex flex-col items-center gap-1 transition-all" onclick="app.navigate('painel')">
            <div class="w-12 h-8 rounded-full flex items-center justify-center transition-colors">
                <span class="material-symbols-outlined text-outline">dashboard</span>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-wider text-outline">Painel</span>
        </button>
        <button data-view="planos" class="nav-item-link flex flex-col items-center gap-1 transition-all" onclick="app.navigate('planos')">
            <div class="w-12 h-8 rounded-full flex items-center justify-center transition-colors">
                <span class="material-symbols-outlined text-outline">assignment</span>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-wider text-outline">Planos</span>
        </button>
        <button data-view="proposito" class="nav-item-link flex flex-col items-center gap-1 transition-all" onclick="app.navigate('proposito')">
            <div class="w-12 h-8 rounded-full flex items-center justify-center transition-colors">
                <span class="material-symbols-outlined text-outline">auto_awesome</span>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-wider text-outline">Propósito</span>
        </button>
    </nav>

    <!-- SPA Logic entry -->
    <script type="module" src="app.js"></script>
</body>
</html>
