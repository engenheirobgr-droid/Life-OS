<main class="px-6 max-w-2xl mx-auto space-y-10 mt-4">
<!-- Hero: Date & Energy -->
<section class="space-y-4">
<div class="flex flex-col">
<div class="flex items-center justify-between">
<span class="text-sm font-label uppercase tracking-widest text-secondary font-medium">Hoje</span>
<div class="bg-stone-200/50 dark:bg-stone-800/50 rounded-full px-3 py-1 text-xs flex items-center gap-1.5 font-bold">
<span class="material-symbols-outlined text-[14px] text-primary" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
                        <span id="header-streak">12 dias</span>
                    </div>
<h2 id="data-hoje" class="text-4xl font-headline font-bold italic tracking-tight text-on-background mt-1"></h2>
</div>
<div class="bg-surface-container-low p-5 rounded-xl flex items-center justify-between">
<div>
<p class="text-sm font-medium text-on-surface-variant">Nível de Energia</p>
<p class="text-xs text-outline italic">Como você se sente agora?</p>
</div>
<div class="flex gap-2">
<button class="energy-btn w-8 h-8 rounded-full border border-outline-variant flex items-center justify-center text-xs font-medium hover:border-primary hover:text-primary transition-all">1</button>
<button class="energy-btn w-8 h-8 rounded-full border border-outline-variant flex items-center justify-center text-xs font-medium hover:border-primary hover:text-primary transition-all">2</button>
<button class="energy-btn w-8 h-8 rounded-full border border-primary-container bg-primary-container text-on-primary-container flex items-center justify-center text-xs font-medium">3</button>
<button class="energy-btn w-8 h-8 rounded-full border border-outline-variant flex items-center justify-center text-xs font-medium hover:border-primary hover:text-primary transition-all">4</button>
<button class="energy-btn w-8 h-8 rounded-full border border-outline-variant flex items-center justify-center text-xs font-medium hover:border-primary hover:text-primary transition-all">5</button>
</div>
</div>
</section>
<!-- Mini Weekly Heatmap -->
<section class="space-y-3">
<div id="weekly-heatmap"></div>
</section>
<!-- Section: Checklist do dia -->
<section class="space-y-6">
<div class="flex items-baseline justify-between">
<h3 class="text-2xl font-headline font-semibold italic text-on-background">Para hoje</h3>
<span id="pending-count" class="text-xs font-label uppercase tracking-wider text-outline font-medium">3 pendentes</span>
</div>
<div id="checklist-container" class="space-y-3"></div>

</section>
<!-- Section: Hábitos -->
<section class="space-y-4">
<h3 class="text-2xl font-headline font-semibold italic text-on-background">Hábitos de hoje</h3>
<div id="habits-container" class="flex gap-4 overflow-x-auto pb-4 hide-scrollbar -mx-6 px-6">
</div>
<!-- Identity Toast (Dynamic) -->
<div class="fixed bottom-28 left-0 right-0 z-50 flex justify-center pointer-events-none px-6">
    <div id="identity-toast" class="hidden pointer-events-auto bg-primary text-on-primary px-6 py-3 rounded-full flex items-center gap-3 shadow-2xl toast-animate-in">
        <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">stars</span>
        <span class="text-sm font-medium" id="toast-message">Hoje você foi um atleta! 💪</span>
    </div>
</div>
</section>
<!-- Section: Diário -->
<section class="space-y-6 pt-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-tertiary">bedtime</span>
<h3 class="text-2xl font-headline font-semibold italic text-on-background">Como foi o dia</h3>
</div>
    <div class="bg-surface-container-lowest p-6 rounded-xl space-y-6 shadow-[0_8px_30px_rgba(0,0,0,0.04)]">
        <div class="space-y-2">
            <label class="text-xs font-label uppercase tracking-widest text-outline font-bold">Pelo que sou grato hoje?</label>
            <textarea id="diario-gratidao" class="w-full bg-transparent border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 text-sm p-4 text-on-surface resize-none" placeholder="Escreva aqui..." rows="3"></textarea>
        </div>
        
        <div class="space-y-2">
            <label class="text-xs font-label uppercase tracking-widest text-outline font-bold">O que funcionou?</label>
            <textarea id="diario-funcionou" class="w-full bg-transparent border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 text-sm p-4 text-on-surface resize-none" placeholder="Vindas do dia..." rows="3"></textarea>
        </div>

        <div class="space-y-4 pt-2 border-t border-outline-variant/10">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-sm">auto_awesome</span>
                <label class="text-xs font-label uppercase tracking-widest text-primary font-bold">Ritual de Shutdown</label>
            </div>
            <p class="text-xs text-outline italic">O que você deixa para trás agora para descansar em paz.</p>
            <textarea id="diario-shutdown-1" class="w-full bg-transparent border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 text-sm p-4 text-on-surface resize-none" placeholder="Encerrando o dia..." rows="3"></textarea>
        </div>
<div class="flex items-center justify-between pt-4">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span id="streak-count" class="text-sm font-bold">12 Dias de sequência</span>
</div>
<button id="btn-salvar-diario" onclick="window.app.saveDailyLog()" class="bg-primary text-on-primary px-6 py-2.5 rounded-lg text-sm font-bold shadow-md hover:shadow-lg transition-all active:scale-95">
                        Salvar diário
                    </button>
</div>
</div>
</section>
</main>
<!-- FAB -->
<button onclick="window.app.openCreateModal()" class="fixed bottom-28 right-6 w-14 h-14 bg-primary text-on-primary rounded-full shadow-xl flex items-center justify-center z-50 hover:scale-105 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'wght' 500;">add</span>
</button>

<!-- Progress Thread (Decorative background element) -->
<div class="fixed left-4 top-0 bottom-0 w-[1px] bg-primary/10 -z-10 pointer-events-none hidden lg:block"></div>
<script>
  const identityMap = {
    'Saúde': 'atleta 💪',
    'Mente': 'pensador 🧠',
    'Carreira': 'líder 👔',
    'Finanças': 'estrategista 💰',
    'Relacionamentos': 'conector 🤝',
    'Família': 'guardião 🏠',
    'Lazer': 'explorador 🎨',
    'Propósito': 'inspirador ✨'
  };

  window.showIdentityToast = function(area) {
    const toast = document.getElementById('identity-toast');
    const msg = document.getElementById('toast-message');
    const identity = identityMap[area] || 'campeão 🏆';
    
    msg.textContent = `Hoje você foi um ${identity}!`;
    toast.classList.remove('hidden');
    
    setTimeout(() => {
      toast.classList.add('opacity-0');
      setTimeout(() => {
        toast.classList.add('hidden');
        toast.classList.remove('opacity-0');
      }, 300);
    }, 3000);
  }


</script>
