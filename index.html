<!DOCTYPE html>
<html lang="pt-br" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS | Sistema Vida</title>
    
    <!-- PWA Setup -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#01696f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    
    <!-- Tailwind for rapid premium layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- SheetJS for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#01696f',
                        'on-primary': '#ffffff',
                        'primary-container': '#9cf1f6',
                        'on-primary-container': '#002022',
                        secondary: '#4a6365',
                        'on-secondary': '#ffffff',
                        'secondary-container': '#cce8ea',
                        'on-secondary-container': '#051f21',
                        tertiary: '#4e5f7d',
                        'on-tertiary': '#ffffff',
                        'tertiary-container': '#d6e3ff',
                        'on-tertiary-container': '#081c36',
                        error: '#ba1a1a',
                        'on-error': '#ffffff',
                        'error-container': '#ffdad6',
                        'on-error-container': '#410002',
                        background: '#f8fafc',
                        'on-background': '#191c1d',
                        surface: '#f8fafc',
                        'on-surface': '#191c1d',
                        'surface-variant': '#dae4e5',
                        'on-surface-variant': '#3f484a',
                        outline: '#6f797a',
                        'outline-variant': '#bec8ca',
                        'surface-container-lowest': '#ffffff',
                        'surface-container-low': '#f0f4f5',
                        'surface-container': '#e9eff0',
                        'surface-container-high': '#e3e9eb',
                        'surface-container-highest': '#dee4e5',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        headline: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        @layer base {
            body { @apply font-sans bg-background text-on-background antialiased selection:bg-primary/20; }
            h1, h2, h3, h4 { @apply font-headline; }
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Material Symbols Fill Animation */
        .nav-item-link[data-active="true"] .material-symbols-outlined {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Smooth View Transitions */
        #app-content { transition: opacity 0.2s ease-in-out; }
        #app-content.loading { opacity: 0; }
        
        /* Toast Animation */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-animate-in { animation: slideUp 0.4s cubic-bezier(0.19, 1, 0.22, 1); }
        
        /* Animações do Onboarding */
        .step-transition { transition: opacity 0.4s ease, transform 0.4s ease; }
        .step-hidden-right { opacity: 0; pointer-events: none; transform: translateX(30px); visibility: hidden; }
        .step-hidden-left { opacity: 0; pointer-events: none; transform: translateX(-30px); visibility: hidden; }
        .step-active { opacity: 1; pointer-events: auto; transform: translateX(0); position: relative !important; z-index: 10; visibility: visible; }
        
        /* Abas de Planos */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Mobile Header -->
    <header class="lg:hidden px-6 py-4 flex items-center justify-between sticky top-0 bg-background/80 backdrop-blur-md z-40 border-b border-outline-variant/30">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center">
                <span class="material-symbols-outlined text-white text-xl">temp_preferences_custom</span>
            </div>
            <span class="font-headline font-bold text-lg tracking-tight text-on-background">Life OS</span>
        </div>
        <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-surface-container" onclick="app.navigate('perfil')">
            <span class="material-symbols-outlined text-outline">account_circle</span>
        </button>
    </header>

    <div class="flex flex-1 overflow-hidden lg:overflow-visible">
        <!-- Desktop Sidebar -->
        <aside class="hidden lg:flex w-72 flex-col border-r border-outline-variant/30 bg-surface px-4 py-8 sticky top-0 h-screen">
            <div class="px-4 mb-10 flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined text-white text-2xl">temp_preferences_custom</span>
                </div>
                <div>
                    <h1 class="font-headline font-bold text-xl tracking-tight leading-none text-on-background">Life OS</h1>
                    <p class="text-[10px] text-outline uppercase tracking-widest mt-1 font-bold">Arquitetura Vital</p>
                </div>
            </div>

            <nav class="flex-1 space-y-2">
                <button data-view="hoje" class="nav-item-link w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all hover:bg-surface-container text-on-surface-variant font-medium" onclick="app.navigate('hoje')">
                    <span class="material-symbols-outlined">today</span>
                    Hoje
                </button>
                <button data-view="painel" class="nav-item-link w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all hover:bg-surface-container text-on-surface-variant font-medium" onclick="app.navigate('painel')">
                    <span class="material-symbols-outlined">dashboard</span>
                    Painel
                </button>
                <button data-view="planos" class="nav-item-link w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all hover:bg-surface-container text-on-surface-variant font-medium" onclick="app.navigate('planos')">
                    <span class="material-symbols-outlined">assignment</span>
                    Planos
                </button>
                <button data-view="proposito" class="nav-item-link w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all hover:bg-surface-container text-on-surface-variant font-medium" onclick="app.navigate('proposito')">
                    <span class="material-symbols-outlined">auto_awesome</span>
                    Propósito
                </button>
            </nav>

            <div class="mt-auto pt-6 border-t border-outline-variant/20">
                <button data-view="perfil" class="nav-item-link w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all hover:bg-surface-container text-on-surface-variant font-medium" onclick="app.navigate('perfil')">
                    <span class="material-symbols-outlined">account_circle</span>
                    <div class="flex flex-col text-left">
                        <span class="text-sm font-bold text-on-background" id="perfil-sidebar-name">Bruno</span>
                        <span class="text-[10px] text-outline uppercase tracking-wider">Ver Perfil</span>
                    </div>
                </button>
            </div>
        </aside>

        <!-- Main Content area -->
        <main class="flex-1 overflow-y-auto min-h-screen pb-32 lg:pb-12 bg-background relative">
            <div id="app-content" class="fade-in">
                <!-- Views loaded here -->
                <div class="flex flex-col items-center justify-center min-h-[60vh] text-outline animate-pulse">
                    <span class="material-symbols-outlined text-4xl mb-4">refresh</span>
                    <p class="font-medium">Carregando sua jornada...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="lg:hidden fixed bottom-0 left-0 right-0 h-20 bg-surface/90 backdrop-blur-xl border-t border-outline-variant/30 px-6 flex items-center justify-between z-50">
        <button data-view="hoje" class="nav-item-link flex flex-col items-center gap-1 transition-all" onclick="app.navigate('hoje')">
            <div class="w-12 h-8 rounded-full flex items-center justify-center transition-colors hover:bg-primary-container/30">
                <span class="material-symbols-outlined text-outline">today</span>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-wider text-outline">Hoje</span>
        </button>
        <button data-view="painel" class="nav-item-link flex flex-col items-center gap-1 transition-all" onclick="app.navigate('painel')">
            <div class="w-12 h-8 rounded-full flex items-center justify-center transition-colors">
                <span class="material-symbols-outlined text-outline">dashboard</span>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-wider text-outline">Painel</span>
        </button>
        <button data-view="planos" class="nav-item-link flex flex-col items-center gap-1 transition-all" onclick="app.navigate('planos')">
            <div class="w-12 h-8 rounded-full flex items-center justify-center transition-colors">
                <span class="material-symbols-outlined text-outline">assignment</span>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-wider text-outline">Planos</span>
        </button>
        <button data-view="proposito" class="nav-item-link flex flex-col items-center gap-1 transition-all" onclick="app.navigate('proposito')">
            <div class="w-12 h-8 rounded-full flex items-center justify-center transition-colors">
                <span class="material-symbols-outlined text-outline">auto_awesome</span>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-wider text-outline">Propósito</span>
        </button>
    </nav>

    <!-- CRUD Modal Universal -->
    <div id="crud-modal" class="hidden fixed inset-0 z-[100] bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-surface-container-lowest w-full max-w-md rounded-2xl shadow-xl overflow-hidden flex flex-col">
            <div class="p-6 border-b border-outline-variant/20">
                <h3 class="font-headline text-xl font-bold text-on-background">Novo Item</h3>
            </div>
            
            <form id="crud-form" onsubmit="event.preventDefault()" class="p-6 flex flex-col gap-4">
                <div class="flex flex-col gap-1.5">
                    <label for="crud-title" class="text-xs font-label uppercase tracking-widest text-outline font-bold">Título</label>
                    <input type="text" id="crud-title" class="w-full bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-sm h-12 px-4 text-on-surface" required>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label for="crud-type" class="text-xs font-label uppercase tracking-widest text-outline font-bold">Tipo</label>
                        <select id="crud-type" class="w-full bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-sm h-12 px-4 text-on-surface" required onchange="document.getElementById('crud-trigger-container').style.display = (this.value === 'habits' ? 'flex' : 'none')">
                            <option value="metas">Metas</option>
                            <option value="okrs">OKRs</option>
                            <option value="macros">Macro Ações</option>
                            <option value="micros">Micro Ações</option>
                            <option value="habits">Hábito Recorrente</option>
                        </select>
                    </div>
                    
                    <div class="flex flex-col gap-1.5">
                        <label for="crud-dimension" class="text-xs font-label uppercase tracking-widest text-outline font-bold">Dimensão</label>
                        <select id="crud-dimension" class="w-full bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-sm h-12 px-4 text-on-surface" required>
                            <option value="Saúde">Saúde</option>
                            <option value="Mente">Mente</option>
                            <option value="Carreira">Carreira</option>
                            <option value="Finanças">Finanças</option>
                            <option value="Relacionamentos">Relacionamentos</option>
                            <option value="Família">Família</option>
                            <option value="Lazer">Lazer</option>
                            <option value="Propósito">Propósito</option>
                        </select>
                    </div>
                </div>
                
                <div class="flex flex-col gap-1.5">
                    <label for="crud-context" class="text-xs font-label uppercase tracking-widest text-outline font-bold">Contexto / Detalhe</label>
                    <input type="text" id="crud-context" class="w-full bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-sm h-12 px-4 text-on-surface placeholder-outline-variant" placeholder="Indicador, Propósito ou Contexto" required>
                </div>

                <div id="crud-trigger-container" class="flex-col gap-1.5" style="display: none;">
                    <label for="crud-trigger" class="text-xs font-label uppercase tracking-widest text-outline font-bold">Gatilho (Opcional)</label>
                    <input type="text" id="crud-trigger" class="w-full bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-sm h-12 px-4 text-on-surface placeholder-outline-variant" placeholder="Ex: Depois de escovar os dentes, eu farei...">
                    <p class="text-[10px] text-outline mt-0.5">Ancore este novo hábito a uma ação que você já faz todos os dias.</p>
                </div>
            </form>
            
            <div class="p-6 border-t border-outline-variant/20 flex items-center justify-end gap-3 bg-surface-container-low/30">
                <button type="button" onclick="window.app.closeModal()" class="px-5 py-2.5 text-sm font-bold text-outline hover:text-on-surface hover:bg-surface-container-highest transition-colors rounded-lg">
                    Cancelar
                </button>
                <button type="button" onclick="window.app.saveNewEntity()" class="px-5 py-2.5 bg-primary text-on-primary text-sm font-bold rounded-lg shadow-md hover:shadow-lg active:scale-95 transition-all">
                    Salvar
                </button>
            </div>
        </div>
    </div>

    <!-- Text Edit Modal -->
    <div id="text-edit-modal" class="hidden fixed inset-0 z-[110] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-surface-container-lowest w-full max-w-md rounded-2xl shadow-xl overflow-hidden flex flex-col">
            <div class="p-6 border-b border-outline-variant/20">
                <h3 id="text-edit-title" class="font-headline text-xl font-bold"></h3>
            </div>
            <div class="p-6">
                <textarea id="text-edit-input" rows="6" class="w-full bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-sm p-4 text-on-surface resize-none"></textarea>
            </div>
            <div class="p-6 border-t border-outline-variant/20 flex items-center justify-end gap-3 bg-surface-container-low/30">
                <button type="button" onclick="window.app.closeTextModal()" class="px-5 py-2.5 text-sm font-bold text-outline hover:text-on-surface hover:bg-surface-container-highest transition-colors rounded-lg">
                    Cancelar
                </button>
                <button type="button" onclick="window.app.saveTextEdit()" class="px-5 py-2.5 bg-primary text-on-primary text-sm font-bold rounded-lg shadow-md hover:shadow-lg active:scale-95 transition-all">
                    Salvar
                </button>
            </div>
        </div>
    </div>

    <!-- Review Modal -->
    <div id="review-modal" class="hidden fixed inset-0 z-[120] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-surface-container-lowest w-full max-w-lg rounded-2xl shadow-xl flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-outline-variant/20 flex flex-col">
                <h3 class="font-headline text-xl font-bold text-on-background">Revisão Semanal</h3>
                <p class="text-xs text-outline uppercase tracking-widest font-bold mt-1">Fechamento de Ciclo</p>
            </div>
            
            <form id="review-form" onsubmit="event.preventDefault()" class="p-6 flex flex-col gap-6 overflow-y-auto no-scrollbar flex-1">
                <div class="flex flex-col gap-2">
                    <label for="rev-q1" class="text-xs uppercase text-primary font-bold tracking-wider">O que planejei?</label>
                    <textarea id="rev-q1" rows="2" class="w-full bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-sm p-4 text-on-surface resize-none"></textarea>
                </div>
                
                <div class="flex flex-col gap-2">
                    <label for="rev-q2" class="text-xs uppercase text-primary font-bold tracking-wider">O que executei?</label>
                    <textarea id="rev-q2" rows="2" class="w-full bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-sm p-4 text-on-surface resize-none"></textarea>
                </div>

                <div class="flex flex-col gap-2">
                    <label for="rev-q3" class="text-xs uppercase text-primary font-bold tracking-wider">O que aprendi?</label>
                    <textarea id="rev-q3" rows="2" class="w-full bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-sm p-4 text-on-surface resize-none"></textarea>
                </div>

                <div class="flex flex-col gap-2">
                    <label for="rev-q4" class="text-xs uppercase text-primary font-bold tracking-wider">O que ajustar?</label>
                    <textarea id="rev-q4" rows="2" class="w-full bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-sm p-4 text-on-surface resize-none"></textarea>
                </div>

                <div class="flex flex-col gap-2">
                    <label for="rev-q5" class="text-xs uppercase text-primary font-bold tracking-wider">Intenção da próxima semana</label>
                    <textarea id="rev-q5" rows="2" class="w-full bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 text-sm p-4 text-on-surface resize-none"></textarea>
                </div>
            </form>
            
            <div class="p-6 border-t border-outline-variant/20 flex items-center justify-end gap-3 bg-surface-container-low/30 rounded-b-2xl shrink-0">
                <button type="button" onclick="window.app.closeReviewModal()" class="px-5 py-2.5 text-sm font-bold text-outline hover:text-on-surface hover:bg-surface-container-highest transition-colors rounded-lg">
                    Cancelar
                </button>
                <button type="button" id="btn-save-review" onclick="window.app.saveReview()" class="px-5 py-2.5 bg-primary text-on-primary text-sm font-bold rounded-lg shadow-md hover:shadow-lg active:scale-95 transition-all">
                    Salvar Revisão
                </button>
            </div>
        </div>
    </div>

    <!-- SPA Logic entry -->
    <script type="module" src="app.js"></script>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('SW registered:', registration);
                    })
                    .catch(error => {
                        console.log('SW registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
